<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Snack4U">
  <title>Snack4U</title>
  <!-- Stylized "S4U" mark in Snack4U gold (#D4AF37) on transparent background. -->
