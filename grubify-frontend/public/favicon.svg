    <!-- S curve -->
    <path d="M24 14 Q12 14 12 22 Q12 30 24 30 Q36 30 36 38 Q36 46 24 46" />
  </g>
  <g fill="#D4AF37" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-weight="700">
