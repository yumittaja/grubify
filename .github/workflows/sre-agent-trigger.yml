name: Trigger SRE Agent

on:
  push:
    branches:
      - main
  issues:
    types:
      - opened

jobs:
  notify-sre-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger SRE Agent
        env:
          TRIGGER_TOKEN: ${{ secrets.SRE_AGENT_TRIGGER_TOKEN }}
        run: |
          HTTP_CODE=$(curl -s -o response.txt -w "%{http_code}" -X POST \
            "https://sre-agent-uqeqqjkb7aezo--750131e9.6665b3be.eastus2.azuresre.ai/api/v1/httptriggers/trigger/920f5607-6e41-4dab-ab15-9403ce9c14fc" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TRIGGER_TOKEN" \
            -d "{
              \"repository\": \"${{ github.repository }}\",
              \"ref\": \"${{ github.ref }}\",
              \"sha\": \"${{ github.sha }}\",
              \"actor\": \"${{ github.actor }}\",
              \"event\": \"${{ github.event_name }}\",
              \"issue_number\": \"${{ github.event.issue.number }}\",
              \"issue_title\": \"${{ github.event.issue.title }}\"
            }")
          echo "HTTP Status: $HTTP_CODE"
          cat response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::SRE Agent trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi
